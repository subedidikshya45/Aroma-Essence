    <style>
        /* ==========================================================================
           1. DESIGN SYSTEM & VARIABLES
           ========================================================================== */
        :root {
            --primary-gold: #c5a880;
            --primary-dark: #111111;
            --secondary-dark: #1a1a1a;
            --light-beige: #f9f6f0;
            --accent-maroon: #581818;
            --text-gray: #777777;
            --text-light: #ffffff;
            --border-color: #e5dfd3;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* ==========================================================================
           2. BASE RESET & UTILITIES
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--light-beige);
            color: var(--primary-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition-smooth);
        }

        ul {
            list-style: none;
        }

        img {
            max-width: 100%;
            display: block;
            object-fit: cover;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .section-padding {
            padding: 8rem 0;
        }

        .text-center { text-align: center; }

        /* Typography Utilities */
        .section-title {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            font-weight: 400;
            color: var(--primary-dark);
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-transform: capitalize;
        }

        .section-subtitle {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--primary-gold);
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .divider {
            width: 60px;
            height: 1px;
            background-color: var(--primary-gold);
            margin: 1.5rem auto;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-family: var(--font-sans);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            background-color: var(--primary-dark);
            color: var(--text-light);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 0; height: 100%;
            background-color: var(--primary-gold);
            z-index: -1;
            transition: var(--transition-smooth);
        }

        .btn-primary:hover::after {
            width: 100%;
        }

        .btn-outline {
            border: 1px solid var(--primary-dark);
            background: transparent;
            color: var(--primary-dark);
        }

        .btn-outline:hover {
            background-color: var(--primary-dark);
            color: var(--text-light);
        }

        /* ==========================================================================
           3. HEADER & NAVIGATION
           ========================================================================== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: transparent;
            transition: var(--transition-smooth);
            padding: 1.5rem 0;
        }

        header.scrolled {
            background-color: rgba(17, 17, 17, 0.95);
            padding: 1rem 0;
            border-bottom: 1px solid rgba(197, 168, 128, 0.2);
        }

        header.scrolled .nav-link, 
        header.scrolled .logo,
        header.scrolled .nav-icon {
            color: var(--text-light);
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--primary-dark);
        }

        .logo span {
            color: var(--primary-gold);
        }

        .nav-menu {
            display: flex;
            gap: 2.5rem;
        }

        .nav-link {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            color: var(--primary-dark);
            position: relative;
            padding-bottom: 4px;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 0; height: 1px;
            background-color: var(--primary-gold);
            transition: var(--transition-smooth);
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-icon {
            font-size: 1.2rem;
            color: var(--primary-dark);
            cursor: pointer;
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background-color: var(--primary-gold);
            color: var(--primary-dark);
            font-size: 0.7rem;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            color: var(--primary-dark);
            cursor: pointer;
        }

        /* ==========================================================================
           4. HERO SECTION
           ========================================================================== */
        #home {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1547887537-6158d64c35b3?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            display: flex;
            align-items: center;
            color: var(--text-light);
            text-align: center;
            position: relative;
        }

        /* Fix visibility for top menu on load before scroll */
        header:not(.scrolled) .nav-link,
        header:not(.scrolled) .logo,
        header:not(.scrolled) .nav-icon,
        header:not(.scrolled) .menu-toggle {
            color: var(--text-light);
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeInUp 1.5s ease;
        }

        .hero-title {
            font-family: var(--font-serif);
            font-size: 5.5rem;
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: 4px;
        }

        .hero-title em {
            font-style: italic;
            color: var(--primary-gold);
        }

        .hero-desc {
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 3rem;
            font-weight: 300;
            color: rgba(255,255,255,0.85);
        }

        /* ==========================================================================
           5. ABOUT & ESSENTIALS
           ========================================================================== */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            align-items: center;
        }

        .about-images {
            position: relative;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
        }

        .img-main {
            grid-column: 1 / span 10;
            grid-row: 1;
            height: 550px;
            border: 1px solid var(--primary-gold);
            padding: 15px;
            background-color: #fff;
        }

        .img-sub {
            grid-column: 6 / -1;
            grid-row: 1;
            margin-top: 150px;
            height: 400px;
            z-index: 2;
            border: 10px solid var(--light-beige);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .about-text {
            padding-right: 2rem;
        }

        .about-text p {
            color: var(--text-gray);
            margin-bottom: 1.5rem;
            font-size: 1rem;
            text-align: justify;
        }

        .features-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 4rem;
        }

        .feature-box {
            background-color: #ffffff;
            padding: 3rem 2rem;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: var(--transition-smooth);
        }

        .feature-box:hover {
            transform: translateY(-10px);
            border-color: var(--primary-gold);
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
        }

        .feature-box i {
            font-size: 2.5rem;
            color: var(--primary-gold);
            margin-bottom: 1.5rem;
        }

        .feature-box h3 {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .feature-box p {
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        /* ==========================================================================
           6. PRODUCTS CATALOGUE

        }
