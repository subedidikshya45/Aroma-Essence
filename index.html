<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA – Luxury Perfumes & Aroma Essences | Butwal, Nepal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================
           1. RESET & BASE STYLES
           ========================================== */
        :root {
            --primary-color: #111111;
            --secondary-color: #fcfbfa;
            --accent-color: #c5a880;
            --accent-hover: #b39369;
            --text-dark: #222222;
            --text-light: #666666;
            --text-muted: #999999;
            --border-color: #e5e0da;
            --card-bg: #ffffff;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
            --container-padding: 0 8%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--secondary-color);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition-smooth);
        }

        ul {
            list-style: none;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        button, input, textarea, select {
            font-family: inherit;
            background: none;
            border: none;
            outline: none;
        }

        /* Utility Components */
        .section-padding {
            padding: 100px 0;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--container-padding);
        }

        .text-center { text-align: center; }

        .btn {
            display: inline-block;
            padding: 14px 36px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            border: 1px solid var(--primary-color);
            cursor: pointer;
            position: relative;
            z-index: 1;
            transition: var(--transition-smooth);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: var(--secondary-color);
        }

        .btn-primary:hover {
            background-color: transparent;
            color: var(--primary-color);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary-color);
        }

        .btn-outline:hover {
            background-color: var(--primary-color);
            color: var(--secondary-color);
        }

        .btn-accent {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .btn-accent:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .section-title {
            margin-bottom: 50px;
        }

        .section-title span {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--accent-color);
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .section-title h2 {
            font-family: var(--font-serif);
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .section-title p {
            max-width: 600px;
            margin: 20px auto 0 auto;
            color: var(--text-light);
            font-size: 0.95rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--secondary-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }

        /* ==========================================
           2. ANNOUNCEMENT BAR & NAVIGATION
           ========================================== */
        .announcement-bar {
            background-color: var(--primary-color);
            color: var(--secondary-color);
            text-align: center;
            padding: 8px 0;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 400;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        header {
            position: fixed;
            top: 33px;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: transparent;
            transition: var(--transition-smooth);
            padding: 25px 0;
        }

        header.scrolled {
            top: 0;
            background-color: rgba(252, 251, 250, 0.96);
            box-shadow: 0 2px 20px rgba(0,0,0,0.04);
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 4px;
        }

        .logo span {
            color: var(--accent-color);
        }

        .nav-menu {
            display: flex;
            gap: 40px;
        }

        .nav-link {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            position: relative;
            padding: 5px 0;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background-color: var(--accent-color);
            transition: var(--transition-smooth);
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 25px;
            font-size: 1.1rem;
        }

        .header-icon-btn {
            cursor: pointer;
            position: relative;
            transition: var(--transition-smooth);
        }

        .header-icon-btn:hover {
            color: var(--accent-color);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -10px;
            background-color: var(--accent-color);
            color: white;
            font-size: 0.65rem;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-sans);
            font-weight: 600;
        }

        .menu-toggle {
            display: none;
            font-size: 1.3rem;
            cursor: pointer;
        }

        /* ==========================================
           3. HERO SLIDER SECTION
           ========================================== */
        #hero {
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
            background-color: #111;
        }

        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease-in-out, visibility 1s ease-in-out;
            display: flex;
            align-items: center;
        }

        .hero-slide.active {
            opacity: 1;
            visibility: visible;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.55);
            transform: scale(1.08);
            transition: transform 8s ease;
        }

        .hero-slide.active .hero-bg {
            transform: scale(1);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            color: white;
            max-width: 800px;
            transform: translateY(40px);
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1) 0.3s, opacity 1.2s ease 0.3s;
            opacity: 0;
        }

        .hero-slide.active .hero-content {
            transform: translateY(0);
            opacity: 1;
        }

        .hero-subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--accent-color);
            margin-bottom: 20px;
            display: block;
            font-weight: 500;
        }

        .hero-title {
            font-family: var(--font-serif);
            font-size: 4.5rem;
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .hero-description {
            font-size: 1.05rem;
            font-weight: 300;
            margin-bottom: 40px;
            max-width: 600px;
            color: rgba(255,255,255,0.8);
            letter-spacing: 0.5px;
        }

        .hero-btn-group {
            display: flex;
            gap: 20px;
        }

        .hero-btn-group .btn-outline {
            border-color: white;
            color: white;
        }

        .hero-btn-group .btn-outline:hover {
            background-color: white;
            color: var(--primary-color);
        }

        /* Slider Controls */
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 15;
            width: 50px;
            height: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .slider-arrow:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .slider-arrow-prev { left: 4%; }
        .slider-arrow-next { right: 4%; }

        .slider-dots {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            display: flex;
            gap: 12px;
        }

        .slider-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .slider-dot.active {
            background-color: var(--accent-color);
            width: 24px;
            border-radius: 4px;
        }

        /* ==========================================
           4. BRAND BASICS & CORE VALUES
           ========================================== */
        .basics-grid {
            display: grid;
            grid-template-columns: repeat(3, 11fr);
            gap: 40px;
            margin-top: 20px;
        }

        .basic-card {
            background-color: var(--card-bg);
            padding: 50px 40px;
            border: 1px solid var(--border-color);
            text-align: center;
            transition: var(--transition-smooth);
        }

        .basic-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.03);
            border-color: var(--accent-color);
        }

        .basic-icon {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 25px;
        }

        .basic-card h3 {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 500;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .basic-card p {
            font-size: 0.9rem;
            color: var(--text-light);
            line-height: 1.7;
        }

        /* Story Showcase Split */
        .story-split {
            display: flex;
            align-items: center;
            gap: 80px;
            margin-top: 100px;
        }

        .story-img-container {
            flex: 1;
            position: relative;
        }

        .story-img-main {
            width: 85%;
            height: 550px;
            object-fit: cover;
        }

        .story-img-secondary {
            position: absolute;
            bottom: -40px;
            right: 0;
            width: 50%;
            height: 320px;
            object-fit: cover;
            border: 10px solid var(--secondary-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .story-content {
            flex: 1;
        }

        .story-content h3 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 400;
            line-height: 1.3;
            margin-bottom: 25px;
        }

        .story-content p {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 20px;
            text-align: justify;
        }

        .story-meta {
            display: flex;
            gap: 40px;
            margin-top: 35px;
            border-top: 1px solid var(--border-color);
            padding-top: 35px;
        }

        .meta-item h4 {
            font-family: var(--font-serif);
            font-size: 2rem;
            color: var(--accent-color);
            font-weight: 400;
        }

        .meta-item p {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0;
        }

        /* ==========================================
           5. PRODUCTS CATALOGUE (WITH FILTERS)
           ========================================== */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
        }

        .filter-btn {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            color: var(--text-light);
            padding: 8px 16px;
            cursor: pointer;
            transition: var(--transition-smooth);
            border-bottom: 2px solid transparent;
        }

        .filter-btn:hover,
        .filter-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--accent-color);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: var(--transition-smooth);
            position: relative;
        }

        .product-card:hover {
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            border-color: #d1c9bf;
        }

        .product-img-wrapper {
            position: relative;
            overflow: hidden;
            height: 350px;
            background-color: #f7f7f7;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .product-card:hover .product-img {
            transform: scale(1.06);
        }

        .product-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: var(--accent-color);
            color: white;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            font-weight: 500;
            z-index: 2;
        }

        .product-actions {
            position: absolute;
            bottom: -50px;
            left: 0;
            width: 100%;
            display: flex;
            background-color: rgba(255,255,255,0.9);
            backdrop-filter: blur(5px);
            transition: var(--transition-smooth);
            z-index: 2;
            border-top: 1px solid var(--border-color);
        }

        .product-card:hover .product-actions {
            bottom: 0;
        }

        .action-btn {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .action-btn:first-child {
            border-right: 1px solid var(--border-color);
        }

        .action-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .product-info {
            padding: 25px 20px;
            text-align: center;
        }

        .product-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .product-title {
            font-family: var(--font-serif);
            font-size: 1.35rem;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .product-price {
            font-size: 1rem;
            font-weight: 500;
            color: var(--accent-color);
        }

        .product-price del {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-right: 8px;
            font-weight: 300;
        }

        /* ==========================================
           6. PARALLAX PROMOTIONAL ACCENT
           ========================================== */
        .parallax-section {
            height: 450px;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .parallax-overlay {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background-color: rgba(17, 17, 17, 0.65);
        }

        .parallax-content {
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
            max-width: 700px;
            padding: 0 20px;
        }

        .parallax-content h3 {
            font-family: var(--font-serif);
            font-size: 3rem;
            font-weight: 400;
            margin-bottom: 20px;
        }

        .parallax-content p {
            font-size: 1rem;
            font-weight: 300;
            color: rgba(255,255,255,0.85);
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        /* ==========================================
           7. TESTIMONIALS SLIDER
           ========================================== */
        .testimonials-wrapper {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            height: 300px;
        }

        .testimonial-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-smooth);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .testimonial-item.active {
            opacity: 1;
            visibility: visible;
        }

        .rating-stars {
            color: var(--accent-color);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .testimonial-text {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            line-height: 1.5;
            font-style: italic;
            color: var(--text-dark);
            margin-bottom: 25px;
            font-weight: 400;
        }

        .testimonial-author {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            color: var(--accent-color);
        }

        .testimonial-author span {
            color: var(--text-light);
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
            margin-left: 5px;
        }

        .testimonial-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        /* ==========================================
           8. INFRASTRUCTURE & FAQS
           ========================================== */
        .faq-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: flex-start;
        }

        .faq-accordion {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .faq-item {
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            transition: var(--transition-smooth);
        }

        .faq-header {
            padding: 22px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .faq-header h4 {
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .faq-icon {
            font-size: 0.8rem;
            transition: transform 0.4s ease;
            color: var(--accent-color);
        }

        .faq-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 0 30px;
        }

        .faq-content p {
            padding-bottom: 25px;
            color: var(--text-light);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .faq-item.open {
            border-color: var(--accent-color);
        }

        .faq-item.open .faq-icon {
            transform: rotate(180deg);
        }

        .faq-item.open .faq-content {
            max-height: 200px;
        }

        /* ==========================================
           9. CONTACT & LOCATION DISPATCH
           ========================================== */
        .contact-layout {
            display: grid;
            grid-template-columns: 4fr 6fr;
            gap: 60px;
        }

        .contact-info-panel {
            background-color: var(--primary-color);
            color: white;
            padding: 60px 45px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .contact-panel-title h3 {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .contact-panel-title p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .contact-details-list {
            margin: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .contact-detail-card {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .cd-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(197, 168, 128, 0.15);
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .cd-text h5 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .cd-text p, .cd-text a {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.8);
        }

        .cd-text a:hover {
            color: var(--accent-color);
        }

        .contact-socials h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        .contact-social-icons {
            display: flex;
            gap: 15px;
        }

        .contact-social-icons a {
            width: 38px;
            height: 38px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }
